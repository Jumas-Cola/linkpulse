openapi: 3.0.3
info:
  title: LinkPulse API
  version: 0.1.0
  description: URL monitoring service API

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

  /api/auth/register:
    post:
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Invalid input
        '409':
          description: User already exists

  /api/auth/login:
    post:
      summary: Login user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Invalid credentials

  /api/urls:
    get:
      summary: List all monitored URLs
      operationId: listUrls
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of URLs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MonitoredUrl'
    post:
      summary: Create a new monitored URL
      operationId: createUrl
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: url
                name:
                  type: string
      responses:
        '201':
          description: URL created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoredUrl'
        '400':
          description: Invalid URL

  /api/urls/{urlId}:
    get:
      summary: Get a monitored URL
      operationId: getUrl
      security:
        - bearerAuth: []
      parameters:
        - name: urlId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: URL details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoredUrl'
        '404':
          description: URL not found
    delete:
      summary: Delete a monitored URL
      operationId: deleteUrl
      security:
        - bearerAuth: []
      parameters:
        - name: urlId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: URL deleted
        '404':
          description: URL not found

  /api/urls/history/{urlId}:
    get:
      summary: Get check history for a URL
      operationId: getUrlHistory
      security:
        - bearerAuth: []
      parameters:
        - name: urlId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Check history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CheckResult'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    MonitoredUrl:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
          format: url
        name:
          type: string
        status:
          type: string
          enum: [UP, DOWN]
        createdAt:
          type: string
          format: date-time

    CheckResult:
      type: object
      properties:
        id:
          type: integer
        urlId:
          type: integer
        statusCode:
          type: integer
          nullable: true
        responseTimeMs:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true
        checkedAt:
          type: string
          format: date-time
