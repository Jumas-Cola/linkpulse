server {
    port = 8080
    port = ${?SERVER_PORT}
}

database {
    url = "jdbc:postgresql://localhost:5432/linkpulse"
    url = ${?DB_URL}
    user = "linkpulse"
    user = ${?DB_USER}
    password = "linkpulse_dev"
    password = ${?DB_PASSWORD}
    pool {
        maxSize = 10
    }
}

jwt {
    secret = "dev-secret-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "linkpulse"
    expirationMinutes = 60
}

checker {
    intervalMs = 60000
    intervalMs = ${?CHECK_INTERVAL_MS}
    timeoutMs = 10000
    maxConcurrency = 20
}
